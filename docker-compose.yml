services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_PATH: /data/app.db
      GIGACHAT_CREDENTIALS: ${GIGACHAT_CREDENTIALS}
      # Опционально можно переопределить остальные параметры
      GIGACHAT_API_BASE: ${GIGACHAT_API_BASE:-https://gigachat.devices.sberbank.ru/api/v1}
      GIGACHAT_AUTH_URL: ${GIGACHAT_AUTH_URL:-https://ngw.devices.sberbank.ru:9443/api/v2/oauth}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-GigaChat}
      GIGACHAT_VERIFY_SSL: ${GIGACHAT_VERIFY_SSL:-1}
      HISTORY_MESSAGES_LIMIT: ${HISTORY_MESSAGES_LIMIT:-24}
    volumes:
      - app_data:/data

volumes:
  app_data: